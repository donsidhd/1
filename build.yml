name: Build Godot All Platforms

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  SCONS_CACHE: ${{ github.workspace }}/.scons_cache
  GODOT_CIPHER_KEY: "aaa517151cce6709cd7fc70b718ca4bff0450fe0b81fb9abf4729dda2e713167"
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  # ==================== Linux ====================
  linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [template_debug, template_release]
        mono: [false, true]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install SCons
        run: pip install scons==4.7.0
      
      - name: Setup .NET (for Mono builds)
        if: matrix.mono == true
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libx11-dev libxcursor-dev libxinerama-dev \
            libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev \
            libfreetype6-dev libssl-dev libudev-dev libxi-dev libxrandr-dev \
            yasm gettext
      
      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ${{ env.SCONS_CACHE }}
          key: linux-${{ matrix.target }}-${{ matrix.mono }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            linux-${{ matrix.target }}-${{ matrix.mono }}-
            linux-${{ matrix.target }}-
      
      - name: Build
        env:
          SCONS_CACHE: ${{ env.SCONS_CACHE }}
        run: |
          if [[ "${{ matrix.mono }}" == "true" ]]; then
            scons platform=linuxbsd target=${{ matrix.target }} module_mono_enabled=yes -j$(nproc)
          else
            scons platform=linuxbsd target=${{ matrix.target }} -j$(nproc)
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: godot-linux-${{ matrix.target }}${{ matrix.mono && '-mono' || '' }}
          path: bin/godot.linuxbsd.*
          retention-days: 7

  # ==================== Windows ====================
  windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        target: [template_debug, template_release]
        mono: [false, true]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install SCons
        run: pip install scons==4.7.0
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup .NET (for Mono builds)
        if: matrix.mono == true
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ${{ env.SCONS_CACHE }}
          key: windows-${{ matrix.target }}-${{ matrix.mono }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            windows-${{ matrix.target }}-${{ matrix.mono }}-
            windows-${{ matrix.target }}-
      
      - name: Build
        shell: bash
        env:
          SCONS_CACHE: ${{ env.SCONS_CACHE }}
        run: |
          if [[ "${{ matrix.mono }}" == "true" ]]; then
            scons platform=windows target=${{ matrix.target }} module_mono_enabled=yes -j$NUMBER_OF_PROCESSORS
          else
            scons platform=windows target=${{ matrix.target }} -j$NUMBER_OF_PROCESSORS
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: godot-windows-${{ matrix.target }}${{ matrix.mono && '-mono' || '' }}
          path: bin/godot.windows.*
          retention-days: 7

  # ==================== macOS ====================
  macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [template_debug, template_release]
        mono: [false, true]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install SCons
        run: pip install scons==4.7.0
      
      - name: Setup .NET (for Mono builds)
        if: matrix.mono == true
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install dependencies
        run: brew install yasm
      
      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ${{ env.SCONS_CACHE }}
          key: macos-${{ matrix.target }}-${{ matrix.mono }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            macos-${{ matrix.target }}-${{ matrix.mono }}-
            macos-${{ matrix.target }}-
      
      - name: Build
        env:
          SCONS_CACHE: ${{ env.SCONS_CACHE }}
        run: |
          if [[ "${{ matrix.mono }}" == "true" ]]; then
            scons platform=macos target=${{ matrix.target }} arch=universal module_mono_enabled=yes -j$(sysctl -n hw.ncpu)
          else
            scons platform=macos target=${{ matrix.target }} arch=universal -j$(sysctl -n hw.ncpu)
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: godot-macos-${{ matrix.target }}${{ matrix.mono && '-mono' || '' }}
          path: bin/godot.macos.*
          retention-days: 7

  # ==================== Android ====================
  android:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, arm32]
        target: [template_debug, template_release]
        mono: [false]
        include:
          - arch: arm64
            target: template_release
            mono: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install SCons
        run: pip install scons==4.7.0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup .NET (for Mono builds)
        if: matrix.mono == true
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;23.2.8568313
            cmake;3.22.1
            cmdline-tools;latest
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libx11-dev libxcursor-dev libxinerama-dev \
            libgl1-mesa-dev libglu1-mesa-dev yasm
      
      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ${{ env.SCONS_CACHE }}
          key: android-${{ matrix.arch }}-${{ matrix.target }}-${{ matrix.mono }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            android-${{ matrix.arch }}-${{ matrix.target }}-${{ matrix.mono }}-
            android-${{ matrix.arch }}-${{ matrix.target }}-
      
      - name: Build
        env:
          SCONS_CACHE: ${{ env.SCONS_CACHE }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          SCONS_FLAGS="platform=android target=${{ matrix.target }} android_arch=${{ matrix.arch }}"
          if [[ "${{ matrix.mono }}" == "true" ]]; then
            SCONS_FLAGS="$SCONS_FLAGS module_mono_enabled=yes"
          fi
          scons $SCONS_FLAGS -j$(nproc)
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-${{ matrix.arch }}-${{ matrix.target }}${{ matrix.mono && '-mono' || '' }}
          path: |
            bin/*.apk
            bin/*.aar
          retention-days: 7

  # ==================== iOS ====================
  ios:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [template_debug, template_release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install SCons
        run: pip install scons==4.7.0
      
      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ${{ env.SCONS_CACHE }}
          key: ios-${{ matrix.target }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            ios-${{ matrix.target }}-
            ios-
      
      - name: Build
        env:
          SCONS_CACHE: ${{ env.SCONS_CACHE }}
        run: scons platform=ios target=${{ matrix.target }} ios_simulator=no -j$(sysctl -n hw.ncpu)
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-${{ matrix.target }}
          path: bin/godot.ios.*
          retention-days: 7

  # ==================== Web ====================
  web:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [template_debug, template_release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install SCons
        run: pip install scons==4.7.0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.45
          actions-cache-folder: emsdk-cache
      
      - name: Cache SCons
        uses: actions/cache@v4
        with:
          path: ${{ env.SCONS_CACHE }}
          key: web-${{ matrix.target }}-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            web-${{ matrix.target }}-
            web-
      
      - name: Build
        env:
          SCONS_CACHE: ${{ env.SCONS_CACHE }}
        run: scons platform=web target=${{ matrix.target }} -j$(nproc)
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-${{ matrix.target }}
          path: bin/godot.web.*
          retention-days: 7
