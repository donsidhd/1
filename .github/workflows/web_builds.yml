name: 🌐 Web Builds
on:
  workflow_call:
    # 👇 添加 secrets 声明
    secrets:
      SCRIPT_AES256_ENCRYPTION_KEY:
        required: false
  workflow_dispatch:

# Global Settings
env:
  SCONS_FLAGS: >-
    dev_mode=yes
    debug_symbols=no
    use_closure_compiler=yes
  EM_VERSION: 4.0.11

jobs:
  web-template:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template w/ threads, 64-bit (target=template_release, threads=yes, arch=wasm64)
            cache-name: web-template
            target: template_release
            scons-flags: threads=yes arch=wasm64
            artifact: true

          - name: Template w/o threads, 32-bit (target=template_release, threads=no, arch=wasm32)
            cache-name: web-nothreads-template
            target: template_release
            scons-flags: threads=no arch=wasm32
            artifact: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # 🔑 验证加密密钥
      - name: Check encryption key
        run: |
          if [ -n "$SCRIPT_AES256_ENCRYPTION_KEY" ]; then
            KEY_LEN=${#SCRIPT_AES256_ENCRYPTION_KEY}
            echo "✅ Encryption key is set (length: $KEY_LEN)"
            if [ $KEY_LEN -eq 64 ]; then
              echo "✅ Key has correct length (64 hex chars)"
            else
              echo "⚠️ WARNING: Key length is $KEY_LEN, should be 64"
            fi
          else
            echo "⚠️ No encryption key - building without PCK encryption"
          fi
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.SCRIPT_AES256_ENCRYPTION_KEY }}

      - name: Set up Emscripten latest
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          no-cache: true

      - name: Verify Emscripten setup
        run: |
          emcc -v

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # 🔑 编译 - 通过环境变量传递密钥
      - name: Compilation
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }} ${{ matrix.scons-flags }}
          platform: web
          target: ${{ matrix.target }}
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.SCRIPT_AES256_ENCRYPTION_KEY }}

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Upload artifact
        uses: ./.github/actions/upload-artifact
        if: matrix.artifact
        with:
          name: ${{ matrix.cache-name }}
