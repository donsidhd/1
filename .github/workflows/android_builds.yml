name: 🤖 Android Builds
on:
  workflow_call:
    secrets:
      SERVICE_ACCOUNT_KEY:
        required: false
      SCRIPT_AES256_ENCRYPTION_KEY:
        required: false

  workflow_dispatch:
    inputs:
      use_encryption:
        description: 'Enable PCK encryption'
        required: false
        default: 'false'
        type: boolean

# Global Settings
env:
  SCONS_FLAGS: >-
    dev_mode=yes
    module_text_server_fb_enabled=yes
    swappy=yes

jobs:
  build-android:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # ✅ 导出模板
          - name: Template arm32 (target=template_release, arch=arm32)
            cache-name: android-template-arm32-release
            target: template_release
            scons-flags: arch=arm32

          - name: Template arm64 (target=template_release, arch=arm64)
            cache-name: android-template-arm64-release
            target: template_release
            scons-flags: arch=arm64

          - name: Template arm32 (target=template_debug, arch=arm32)
            cache-name: android-template-arm32-debug
            target: template_debug
            scons-flags: arch=arm32

          - name: Template arm64 (target=template_debug, arch=arm64)
            cache-name: android-template-arm64-debug
            target: template_debug
            scons-flags: arch=arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # 🔑 验证加密密钥
      - name: Check encryption key
        run: |
          if [ -n "$SCRIPT_AES256_ENCRYPTION_KEY" ]; then
            KEY_LEN=${#SCRIPT_AES256_ENCRYPTION_KEY}
            echo "✅ Encryption key is set (length: $KEY_LEN)"
            if [ $KEY_LEN -eq 64 ]; then
              echo "✅ Key has correct length (64 hex chars)"
            else
              echo "⚠️ WARNING: Key length is $KEY_LEN, should be 64"
            fi
          else
            echo "⚠️ No encryption key - building without PCK encryption"
          fi
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.SCRIPT_AES256_ENCRYPTION_KEY }}

      # 🔑 修复 gradlew 权限问题
      - name: Fix gradlew permissions
        run: |
          find . -name "gradlew" -type f -exec chmod +x {} \;
          echo "gradlew permissions fixed"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Download Swappy
        run: python ./misc/scripts/install_swappy_android.py

      # 🔑 编译 - 只通过环境变量传递密钥，不使用 encryption-key 参数
      - name: Compilation
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }} ${{ matrix.scons-flags }}
          platform: android
          target: ${{ matrix.target }}
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.SCRIPT_AES256_ENCRYPTION_KEY }}

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      # 🔑 生成模板
      - name: Generate Godot templates
        run: |
          cd platform/android/java
          chmod +x gradlew
          ./gradlew generateGodotTemplates
          cd ../../..
          ls -l bin/

      - name: Upload artifact
        uses: ./.github/actions/upload-artifact
        with:
          name: ${{ matrix.cache-name }}
